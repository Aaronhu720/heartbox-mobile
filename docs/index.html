<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Half日记 - 你的情感疗愈日记</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #333;
      background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #f3e8ff 70%, #ede9fe 100%);
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 24px; text-align: center; }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 32px; font-weight: 700; color: #7c3aed; margin-bottom: 8px; }
    .tagline { font-size: 18px; color: #6b7280; margin-bottom: 48px; }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
      text-align: left;
    }
    .feature {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .feature .icon { font-size: 28px; margin-bottom: 8px; }
    .feature h3 { font-size: 16px; font-weight: 600; color: #7c3aed; margin-bottom: 6px; }
    .feature p { font-size: 13px; color: #6b7280; line-height: 1.5; }
    .download-section { margin-bottom: 48px; }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #7c3aed;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }
    .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,58,237,0.4); }
    .coming-soon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: rgba(255,255,255,0.6);
      color: #9ca3af;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: 2px dashed #d1d5db;
      margin-left: 12px;
    }
    footer {
      padding: 32px 0;
      border-top: 1px solid rgba(0,0,0,0.08);
      font-size: 13px;
      color: #9ca3af;
    }
    footer a { color: #7c3aed; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .footer-links { margin-bottom: 12px; }
    .footer-links a { margin: 0 12px; }
    @media (max-width: 480px) {
      h1 { font-size: 24px; }
      .tagline { font-size: 15px; }
      .coming-soon { margin-left: 0; margin-top: 12px; }
    }
  </style>
</head>
