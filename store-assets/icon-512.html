<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .icon {
    width: 512px; height: 512px;
    background: linear-gradient(135deg, #FAF6F1, #E8DED4);
    border-radius: 108px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 40px rgba(139,94,90,0.2);
  }
  .icon::before {
    content: '';
    position: absolute; bottom: -20px; right: -20px;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(139,94,90,0.05);
  }
  .heart-container {
    position: relative; z-index: 1;
  }
  /* SVG heart with pen lines */
  svg { filter: drop-shadow(0 4px 16px rgba(139,94,90,0.25)); }
</style>
</head>
<body>
<div class="icon">
  <div class="heart-container">
    <svg width="280" height="280" viewBox="0 0 100 100">
      <!-- Heart -->
      <path d="M50 82 C50 82 18 60 18 38 C18 26 28 18 38 18 C44 18 49 22 50 28 C51 22 56 18 62 18 C72 18 82 26 82 38 C82 60 50 82 50 82z"
        fill="#8B5E5A" />
      <!-- Pen stroke / writing lines -->
      <line x1="36" y1="48" x2="48" y2="36" stroke="#F5EDE6" stroke-width="2.5" stroke-linecap="round" />
      <line x1="48" y1="36" x2="56" y2="44" stroke="#F5EDE6" stroke-width="2.5" stroke-linecap="round" />
      <line x1="33" y1="56" x2="52" y2="56" stroke="#F5EDE6" stroke-width="1.8" stroke-linecap="round" />
      <line x1="36" y1="64" x2="50" y2="64" stroke="#F5EDE6" stroke-width="1.8" stroke-linecap="round" />
    </svg>
  </div>
</div>
</body>
</html>
